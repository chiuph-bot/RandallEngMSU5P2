<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.5 English Module Summary Quiz (2021-2025)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .option-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
        <!-- Header -->
        <div class="bg-indigo-700 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black tracking-tight uppercase">P.5 English Assessment</h1>
                    <p class="opacity-80 font-medium">Comprehensive Unit 5 Part 2 (Banked)</p>
                </div>
                <i class="fas fa-graduation-cap text-4xl opacity-30"></i>
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="content" class="p-8">
            <!-- Content will be injected here by JavaScript -->
        </div>
    </div>

    <script>
        // --- Configuration ---
        const https://script.google.com/macros/s/AKfycbwduMTpPXKKXR7SUTJs-yhbWgiDlKR4TObrxK2M6UPTXkPnBTh1FTpiqz4cGb5L9RQ/exec= ""; 

        // --- Multi-Year Question Bank ---
        const QUESTION_BANK = {
            partA: [
                {
                    theme: "Water Conservation & Community",
                    options: ["scarcity", "in dismay", "inspired by", "infectious", "took no notice of", "rejoiced", "availability", "with great pride"],
                    story: [
                        { id: 'a1', text: "Millions of people live in areas where there is a _________ of clean water.", answer: "scarcity" },
                        { id: 'a2', text: "When the villagers finally saw water flowing from the new pump, they _________.", answer: "rejoiced" },
                        { id: 'a3', text: "Mia was _________ her grandfather's words about saving every drop.", answer: "inspired by" },
                        { id: 'a4', text: "Her excitement was so _________ that soon everyone wanted to help.", answer: "infectious" },
                        { id: 'a5', text: "They looked at the successful project _________.", answer: "with great pride" },
                        { id: 'a6', text: "However, some selfish people still _________ the warnings to save water.", answer: "took no notice of" }
                    ]
                },
                {
                    theme: "Social Conflict & Feelings",
                    options: ["cunning", "gazed upon", "desperate", "in dismay", "filled the air", "as if", "racked their brains", "acquire"],
                    story: [
                        { id: 'a1', text: "Ben _________ the ceiling, wishing his sister would disappear.", answer: "gazed upon" },
                        { id: 'a2', text: "The cat was very _________ and tricked the dog into doing all the work.", answer: "cunning" },
                        { id: 'a3', text: "When the stream was filled with garbage, the animals looked at it _________.", answer: "in dismay" },
                        { id: 'a4', text: "The animals were _________ for help to clean their home.", answer: "desperate" },
                        { id: 'a5', text: "They _________ trying to think of a way to get the magical ring back.", answer: "racked their brains" },
                        { id: 'a6', text: "A delicious smell of sizzling bacon _________.", answer: "filled the air" }
                    ]
                }
            ],
            partB: [
                {
                    title: "The Secrets of the Countryside",
                    questions: [
                        { id: 'b1', type: 'choice', text: "Why should we avoid feeding wild animals?", options: ["They might get sick from human food.", "They are too fast to catch.", "They don't like eating.", "They only eat at night."], answer: "They might get sick from human food." },
                        { id: 'b2', type: 'choice', text: "How do trees help the environment?", options: ["They provide oxygen.", "They change color in winter.", "They are good for climbing.", "They grow in groups."], answer: "They provide oxygen." },
                        { id: 'b3', type: 'choice', text: "What is the main message of the article?", options: ["We must protect nature.", "Don't visit the countryside.", "Trees are very old.", "Animals are dangerous."], answer: "We must protect nature." }
                    ]
                },
                {
                    title: "The Magical Ring Tale",
                    questions: [
                        { id: 'b1', type: 'choice', text: "Why did the farmer sell the ring?", options: ["To buy food and a cart.", "He didn't like it.", "It was broken.", "He wanted a dog."], answer: "To buy food and a cart." },
                        { id: 'b2', type: 'choice', text: "What does 'in the blink of an eye' mean?", options: ["Very quickly.", "While sleeping.", "When looking closely.", "In the morning."], answer: "Very quickly." },
                        { id: 'b3', type: 'choice', text: "The dog and the cat became enemies because...", options: ["The cat took all the credit.", "The dog lost the ring.", "The cat ate the food.", "They never liked each other."], answer: "The cat took all the credit." }
                    ]
                }
            ],
            partC: [
                {
                    context: "Conversation about Volunteering",
                    questions: [
                        { id: 'c1', text: "Vivian: I am a _________ picking up rubbish in the hills.", answer: "volunteer" },
                        { id: 'c2', text: "Lily: It must be hard _________ for you to do that alone.", answer: "work" }
                    ]
                },
                {
                    context: "Grammar: Connectives",
                    questions: [
                        { id: 'c1', text: "We set up the tent _________ the sand was very loose.", answer: "although" },
                        { id: 'c2', text: "He was angry with me _________ I apologized immediately.", answer: "because" }
                    ]
                }
            ]
        };

        let state = {
            step: 'welcome',
            studentInfo: { name: '', class: '', no: '' },
            selectedQuizData: null,
            currentPartIdx: 0,
            answers: {},
            isSubmitting: false,
            results: null
        };

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function initQuizData() {
            state.selectedQuizData = {
                partA: getRandomItem(QUESTION_BANK.partA),
                partB: getRandomItem(QUESTION_BANK.partB),
                partC: getRandomItem(QUESTION_BANK.partC)
            };
        }

        function render() {
            const container = document.getElementById('content');
            
            if (state.step === 'welcome') {
                container.innerHTML = `
                    <div class="space-y-6 fade-in">
                        <div class="bg-indigo-50 p-6 rounded-2xl flex items-center gap-4">
                            <i class="fas fa-user-circle text-indigo-600 text-4xl"></i>
                            <div>
                                <h2 class="font-bold text-lg">Student Login</h2>
                                <p class="text-sm text-slate-500">Please enter your credentials below.</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <input type="text" id="nameInput" placeholder="Full Name (English)" class="w-full p-4 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all" value="${state.studentInfo.name}">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="classInput" placeholder="Class (e.g. 5C)" class="p-4 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none" value="${state.studentInfo.class}">
                                <input type="text" id="noInput" placeholder="No. (1-35)" class="p-4 bg-slate-50 rounded-xl border-2 border-transparent focus:border-indigo-500 outline-none" value="${state.studentInfo.no}">
                            </div>
                        </div>
                        <button onclick="handleStart()" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">Enter Examination Hall</button>
                    </div>
                `;
            } else if (state.step === 'quiz') {
                const parts = ['partA', 'partB', 'partC'];
                const currentPartKey = parts[state.currentPartIdx];
                const content = state.selectedQuizData[currentPartKey];

                let quizHtml = `
                    <div class="fade-in">
                        <div class="flex items-center justify-between mb-4">
                            <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold uppercase tracking-widest">Part ${String.fromCharCode(65 + state.currentPartIdx)}</span>
                            <span class="text-xs font-bold text-slate-400">Section ${state.currentPartIdx + 1}/3</span>
                        </div>
                `;

                if (currentPartKey === 'partA') {
                    quizHtml += `
                        <h2 class="text-xl font-black text-slate-800 mb-2">Vocabulary Cloze</h2>
                        <p class="text-sm text-slate-500 italic mb-6">Read the text and select the best fit from the word bank.</p>
                        <div class="flex flex-wrap gap-2 mb-8 bg-slate-50 p-4 rounded-xl">
                            ${content.options.map(opt => `<span class="px-3 py-1 bg-white shadow-sm text-indigo-700 text-xs font-bold rounded-lg border border-slate-200">${opt}</span>`).join('')}
                        </div>
                        <div class="space-y-6">
                            ${content.story.map((q, idx) => `
                                <div>
                                    <p class="leading-relaxed mb-3">${idx+1}. ${q.text.replace('_________', `<span class="mx-2 border-b-2 border-indigo-500 text-indigo-700 font-bold px-2">${state.answers[q.id] || '____'}</span>`)}</p>
                                    <select onchange="setAnswer('${q.id}', this.value)" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl text-sm font-semibold outline-none focus:border-indigo-500">
                                        <option value="">Choose an answer...</option>
                                        ${content.options.map(o => `<option value="${o}" ${state.answers[q.id] === o ? 'selected' : ''}>${o}</option>`).join('')}
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (currentPartKey === 'partB') {
                    quizHtml += `
                        <h2 class="text-xl font-black text-slate-800 mb-2">Reading: ${content.title}</h2>
                        <p class="text-sm text-slate-500 italic mb-6">Select the best answer based on the provided text logic.</p>
                        <div class="space-y-8">
                            ${content.questions.map((q, idx) => `
                                <div class="space-y-4">
                                    <p class="font-bold text-slate-700">${idx+1}. ${q.text}</p>
                                    <div class="grid gap-2">
                                        ${q.options.map(opt => `
                                            <button onclick="setAnswer('${q.id}', '${opt}')" class="option-card p-4 rounded-xl border-2 text-left text-sm transition-all ${state.answers[q.id] === opt ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 border-slate-100 hover:border-indigo-200'}">
                                                ${opt}
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    quizHtml += `
                        <h2 class="text-xl font-black text-slate-800 mb-2">Summary Cloze</h2>
                        <p class="text-sm text-slate-500 italic mb-6">${content.context}</p>
                        <div class="space-y-8">
                            ${content.questions.map((q, idx) => `
                                <div class="space-y-3">
                                    <p class="leading-relaxed">${idx+1}. ${q.text.replace('_________', `<span class="mx-2 border-b-2 border-indigo-500 text-indigo-700 font-bold px-2">${state.answers[q.id] || '____'}</span>`)}</p>
                                    <input type="text" oninput="setAnswer('${q.id}', this.value)" placeholder="Type answer..." class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-indigo-600 outline-none focus:border-indigo-500" value="${state.answers[q.id] || ''}">
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                quizHtml += `
                    <button onclick="nextStep()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl mt-10 font-bold shadow-lg flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all">
                        ${state.isSubmitting ? '<i class="fas fa-spinner fa-spin"></i> Submitting...' : (state.currentPartIdx < 2 ? 'Next Part <i class="fas fa-chevron-right ml-2"></i>' : 'Final Submission')}
                    </button>
                </div>`;
                
                container.innerHTML = quizHtml;
            } else if (state.step === 'summary') {
                container.innerHTML = `
                    <div class="text-center space-y-8 fade-in">
                        <div class="inline-block p-6 bg-green-100 rounded-full">
                            <i class="fas fa-check-double text-5xl text-green-600"></i>
                        </div>
                        <div>
                            <h2 class="text-3xl font-black text-slate-800">Exam Completed</h2>
                            <p class="text-slate-500 mt-1">Well done, ${state.studentInfo.name}!</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-indigo-50 p-8 rounded-3xl border-2 border-indigo-100">
                                <div class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-1">Total Score</div>
                                <div class="text-4xl font-black text-indigo-700">${state.results.score}/20</div>
                            </div>
                            <div class="bg-indigo-50 p-8 rounded-3xl border-2 border-indigo-100">
                                <div class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-1">Percentage</div>
                                <div class="text-4xl font-black text-indigo-700">${state.results.percentage}%</div>
                            </div>
                        </div>

                        <div class="text-left bg-slate-50 p-6 rounded-2xl border border-slate-200">
                            <h3 class="font-bold text-slate-700 mb-2">Teacher Verification:</h3>
                            <p class="text-slate-500 text-sm leading-relaxed">Status: <span class="text-green-600 font-bold">Successfully Uploaded</span>. Your score has been added to the master sheet.</p>
                        </div>

                        <button onclick="location.reload()" class="text-indigo-600 font-bold text-sm underline">Take Another Random Version</button>
                    </div>
                `;
            }
        }

        window.handleStart = () => {
            const name = document.getElementById('nameInput').value;
            const className = document.getElementById('classInput').value;
            const no = document.getElementById('noInput').value;
            if (name && className && no) {
                state.studentInfo = { name, class: className, no };
                initQuizData();
                state.step = 'quiz';
                render();
            }
        };

        window.setAnswer = (id, val) => {
            state.answers[id] = val;
            render();
        };

        window.nextStep = () => {
            if (state.currentPartIdx < 2) {
                state.currentPartIdx++;
                render();
                window.scrollTo(0, 0);
            } else {
                submitFinal();
            }
        };

        async function submitFinal() {
            state.isSubmitting = true;
            render();

            let total = 0;
            const parts = ['partA', 'partB', 'partC'];
            
            parts.forEach(pk => {
                const part = state.selectedQuizData[pk];
                const questions = part.questions || part.story;
                const weight = pk === 'partA' ? 12 : (pk === 'partB' ? 6 : 2);
                
                questions.forEach(q => {
                    if (state.answers[q.id]?.toLowerCase().trim() === q.answer.toLowerCase()) {
                        total += (weight / questions.length);
                    }
                });
            });

            state.results = {
                score: Math.round(total * 10) / 10,
                max: 20,
                percentage: Math.round((total / 20) * 100)
            };

            if (SHEETS_WEBAPP_URL) {
                try {
                    await fetch(SHEETS_WEBAPP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ ...state.studentInfo, ...state.results })
                    });
                } catch (e) { console.error("Network Error:", e); }
            }

            setTimeout(() => {
                state.step = 'summary';
                state.isSubmitting = false;
                render();
            }, 1000);
        }

        render();
    </script>
</body>
</html>
